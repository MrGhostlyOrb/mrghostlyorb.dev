image: node:latest

stages:
  - build
  - deploy

variables:
  NVM_VERSION: 14.17.6

before_script:
  - whoami
  - sudo -S apt-get install python3 -y <<< "coopster"
  - sudo -S apt-get install make -y <<< "coopster"
  - sudo -S apt-get install g++ -y <<< "coopster"
  - sudo -S apt-get install sshpass -y <<< "coopster"
  # Install nvm
  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
  # Add nvm to PATH
  - export NVM_DIR="$HOME/.nvm"
  - source "/home/gitlab-runner/.nvm/nvm.sh" 
  - nvm install node

build:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

deploy-job:
  stage: deploy
  environment: production
  script:
    # Replace <USERNAME> with your remote server username
    # Replace <PASSWORD> with your remote server password
    # Replace <WEBROOT> with the path to your web root directory on the remote server
    # Replace <LOCALDIR> with the path to your local web root directory
    # Replace <REMOTEHOST> with the IP address or hostname of your remote server
    - LOCALDIR=dist/
    - echo "Creating tarball of local web root directory..."
    - tar czf webroot.tar.gz $LOCALDIR
    - echo "Copying tarball to remote server..."
    - sshpass -p $PASSWORD scp webroot.tar.gz root@144.91.84.91:/tmp/webroot.tar.gz
    - echo "Extracting tarball on remote server..."
    - sshpass -p 194qabsgbG1ODwtDEjuC2e3Nr2t1 ssh root@144.91.84.91 "cd /home/root/mrghostlyorb.dev/ && tar xzf /tmp/webroot.tar.gz"
    - echo "Cleaning up tarball on remote server..."
    - sshpass -p 194qabsgbG1ODwtDEjuC2e3Nr2t1 ssh root@144.91.84.91 "rm /tmp/webroot.tar.gz"
    - echo "Application successfully deployed."
