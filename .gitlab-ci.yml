stages:
  - build
  - deploy

build-job:
  stage: build
  script:
    - npm install     # Install the Node.js dependencies
    - npm run build   # Build the application
  artifacts:
    paths:
      - dist/ 

deploy-job:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
