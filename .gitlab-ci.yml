image: node:latest

stages:
  - build
  - deploy

variables:
  NVM_VERSION: 14.17.6

before_script:
  - whoami
  - echo "coopster" | sudo apt-get install python3 -y
  - echo "coopster" | sudo apt-get install make -y
  - echo "coopster" | sudo apt-get install g++ -y
  # Install nvm
  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
  # Add nvm to PATH
  - export NVM_DIR="$HOME/.nvm"
  - source "/home/gitlab-runner/.nvm/nvm.sh" 
  - nvm install node

build:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

deploy-job:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
